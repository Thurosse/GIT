version: 1
items:
  - id: agents-map
    title: AGENTS stage map
    type: internal
    path: AGENTS.md
    note: Canonical mapping of notebook sections to package modules and run layout.
  - id: stage-setup
    title: Stage 1 entrypoint
    type: internal
    path: veloline/stages/setup.py
    note: CLI entrypoint for setup; reads metaparams and writes baseline state.
  - id: metaparams
    title: Meta-parameters
    type: internal
    path: veloline/metaparams.py
    note: All tunable knobs and device selection.
  - id: data-loading
    title: Data loading
    type: internal
    path: veloline/data_loading.py
    note: AnnData load and barcode demultiplexing.
  - id: preprocess
    title: Preprocess pipeline
    type: internal
    path: veloline/preprocess.py
    note: Filters, HVG, normalization, and data_to_fit.
  - id: mp-builder
    title: mp builder
    type: internal
    path: veloline/mp_builder.py
    note: Builds MetaparContainer for downstream stages.
  - id: io-state
    title: State I/O helpers
    type: internal
    path: veloline/io_state.py
    note: Run dir management and state persistence.
  - id: core-notebook
    title: Core pipeline notebook
    type: internal
    path: .agents/skills/veloline-pipeline-setup/scripts/core_refactored_5.5.ipynb
    note: Original notebook (§1–§8) that this skill wraps; source of truth for pipeline logic.
  - id: driver-notebook
    title: Driver notebook
    type: internal
    path: .agents/skills/veloline-pipeline-setup/scripts/veloline_driver.ipynb
    note: Notebook wrapper that calls the package API.
  - id: splines-torch
    title: Splines torch fixed
    type: internal
    path: veloline/splines_torch_fixed.py
    note: Device-aware spline utilities packaged with veloline.
  - id: anndata
    title: AnnData docs
    type: external
    url: https://anndata.readthedocs.io/
    note: AnnData structure, layers, and I/O.
  - id: scanpy
    title: Scanpy docs
    type: external
    url: https://scanpy.readthedocs.io/
    note: Preprocessing, normalization, and QC.
  - id: scvelo
    title: scVelo docs
    type: external
    url: https://scvelo.readthedocs.io/
    note: Spliced/unspliced conventions and RNA velocity context.
  - id: pytorch
    title: PyTorch docs
    type: external
    url: https://pytorch.org/docs/stable/
    note: Tensor and device basics used in preprocessing.
