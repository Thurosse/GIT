# Trigger eval for veloline-analysis-result skill
# Each case tests whether the agent should invoke (or skip) this skill.
#
# expected values:
#   invoke — the prompt should cause the agent to load and execute this skill
#   skip   — the prompt should NOT trigger this skill (another skill or plain reply instead)
#
# Category codes:
#   P-exact   — mirrors a phrase verbatim from the SKILL.md description
#   P-synonym — paraphrase or synonym of a trigger phrase
#   P-context — contextual trigger (implicit stage-3 intent)
#   N-explicit — explicitly excluded by SKILL.md ("Do NOT trigger on …")
#   N-other-skill — should route to veloline-pipeline-setup or veloline-run-inference instead
#   N-conceptual — user is asking a question, not requesting execution
#   N-edit — user wants to edit code/config, not run the stage

cases:

  # ── Positive: should invoke ───────────────────────────────────────────────

  - id: p01_exact_run_analysis_stage
    category: P-exact
    prompt: "run veloline analysis stage"
    expected: invoke
    rationale: >
      Exact trigger phrase listed in the SKILL.md description.

  - id: p02_exact_regenerate_velocity_plots
    category: P-exact
    prompt: "regenerate velocity plots"
    expected: invoke
    rationale: >
      Exact trigger phrase listed in the SKILL.md description.

  - id: p03_exact_run_shift_analysis
    category: P-exact
    prompt: "run shift analysis"
    expected: invoke
    rationale: >
      Exact trigger phrase listed in the SKILL.md description.

  - id: p04_exact_produce_fit_quality_figures
    category: P-exact
    prompt: "produce fit-quality figures"
    expected: invoke
    rationale: >
      Exact trigger phrase listed in the SKILL.md description.

  - id: p05_exact_make_coexpression_plots
    category: P-exact
    prompt: "make co-expression plots from latest run"
    expected: invoke
    rationale: >
      Exact trigger phrase listed in the SKILL.md description.

  - id: p06_synonym_stage3
    category: P-synonym
    prompt: "re-run stage 3 of the pipeline"
    expected: invoke
    rationale: >
      Stage 3 is exactly what this skill covers (notebook §11–§14).

  - id: p07_synonym_shift_barplot
    category: P-synonym
    prompt: "regenerate the shift barplot and gene panels"
    expected: invoke
    rationale: >
      The shift barplot and per-gene panels are the core output of §13
      (shift analysis), one of the four sections driven by this skill.

  - id: p08_synonym_velocity_alignment
    category: P-synonym
    prompt: "generate the RNA-ADT velocity alignment figures"
    expected: invoke
    rationale: >
      RNA-ADT velocity alignment (Pearson/Spearman scatter) is the
      hallmark output of §12. Unambiguously requests stage-3 execution.

  - id: p09_context_after_fit2_done
    category: P-context
    prompt: "fit2 is done, can you generate the analysis plots?"
    expected: invoke
    rationale: >
      User signals that inference is complete and asks for analysis plots —
      the exact purpose of this skill. Clear contextual trigger.

  - id: p10_context_sections_11_to_14
    category: P-context
    prompt: "I just ran fit2 and want to see all the sections 11 to 14 figures"
    expected: invoke
    rationale: >
      Sections 11–14 map directly to the four analysis modules this skill
      wraps (fit_quality, velocity, shift, coexpression). Strong implicit trigger.

  # ── Negative: should NOT invoke ──────────────────────────────────────────

  - id: n01_explicit_adhoc_colormap
    category: N-explicit
    prompt: "can you change the colormap in the velocity plot to viridis?"
    expected: skip
    rationale: >
      Explicitly excluded: "Do NOT trigger on ad-hoc plot tweaks inside the
      notebook". User wants a one-off styling change, not a full stage-3 run.

  - id: n02_explicit_matplotlib_styling
    category: N-explicit
    prompt: "help me style the matplotlib scatter with a better colorbar"
    expected: skip
    rationale: >
      Explicitly excluded: "requests for matplotlib styling help". Expects
      code-editing assistance or inline advice, not stage execution.

  - id: n03_explicit_new_analytical_experiment
    category: N-explicit
    prompt: "add a new co-expression metric based on mutual information"
    expected: skip
    rationale: >
      Explicitly excluded: "new analytical experiments unrelated to the
      pipeline". User wants to extend the analysis code, not run the
      existing stage.

  - id: n04_other_skill_run_fit2
    category: N-other-skill
    prompt: "run fit2"
    expected: skip
    rationale: >
      "run fit2" is an exact trigger phrase for veloline-run-inference
      (stage 2), not this skill.

  - id: n05_other_skill_rebuild_mp
    category: N-other-skill
    prompt: "rebuild mp"
    expected: skip
    rationale: >
      "rebuild mp" is an exact trigger phrase for veloline-pipeline-setup
      (stage 1), not this skill.

  - id: n06_conceptual_shift_algorithm
    category: N-conceptual
    prompt: "how does the shift analysis algorithm work?"
    expected: skip
    rationale: >
      Conceptual question about algorithmic details — expects an explanation,
      not stage execution.

  - id: n07_conceptual_shift_score_meaning
    category: N-conceptual
    prompt: "what does a positive shift score mean in the RNA-ADT context?"
    expected: skip
    rationale: >
      Asks about biological interpretation — expects a conceptual answer,
      not a pipeline run.

  - id: n08_edit_velocity_bug
    category: N-edit
    prompt: "fix the IndexError in velocity.py line 83"
    expected: skip
    rationale: >
      Code-editing request — user wants to modify velocity.py, not run
      the analysis stage.
