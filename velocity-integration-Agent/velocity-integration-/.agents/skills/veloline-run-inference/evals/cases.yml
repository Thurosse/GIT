# Trigger eval for veloline-run-inference skill
# Each case tests whether the agent should invoke (or skip) this skill.
#
# expected values:
#   invoke — the prompt should cause the agent to load and execute this skill
#   skip   — the prompt should NOT trigger this skill (another skill or plain reply instead)
#
# Category codes:
#   P-exact   — mirrors a phrase verbatim from the SKILL.md description
#   P-synonym — paraphrase or synonym of a trigger phrase
#   P-context — contextual trigger (implicit stage-2 intent)
#   N-explicit — explicitly excluded by SKILL.md ("Do NOT trigger on …")
#   N-other-skill — should route to veloline-pipeline-setup or veloline-analysis-result instead
#   N-conceptual — user is asking a question, not requesting execution
#   N-edit — user wants to edit code/config, not run the stage

cases:

  # ── Positive: should invoke ───────────────────────────────────────────────

  - id: p01_exact_run_inference_stage
    category: P-exact
    prompt: "run veloline inference stage"
    expected: invoke
    rationale: >
      Exact trigger phrase listed in the SKILL.md description.

  - id: p02_exact_run_fit1
    category: P-exact
    prompt: "run fit1"
    expected: invoke
    rationale: >
      Exact trigger phrase listed in the SKILL.md description.

  - id: p03_exact_run_fit2
    category: P-exact
    prompt: "run fit2"
    expected: invoke
    rationale: >
      Exact trigger phrase listed in the SKILL.md description.

  - id: p04_exact_execute_svi
    category: P-exact
    prompt: "execute SVI on the velocity model"
    expected: invoke
    rationale: >
      Exact trigger phrase listed in the SKILL.md description.

  - id: p05_exact_fit_pyro_models
    category: P-exact
    prompt: "fit the Pyro models"
    expected: invoke
    rationale: >
      Exact trigger phrase listed in the SKILL.md description.

  - id: p06_exact_rerun_variational_inference
    category: P-exact
    prompt: "rerun the variational inference"
    expected: invoke
    rationale: >
      Exact trigger phrase listed in the SKILL.md description.

  - id: p07_synonym_stage2
    category: P-synonym
    prompt: "re-run stage 2 of the pipeline"
    expected: invoke
    rationale: >
      Stage 2 is exactly what this skill covers (notebook §9–§10).

  - id: p08_synonym_redo_pseudotime
    category: P-synonym
    prompt: "redo the pseudotime fit"
    expected: invoke
    rationale: >
      Pseudotime ϕ inference is the core product of FIT 1, the first
      step of this skill.

  - id: p09_synonym_refit_kinetics
    category: P-synonym
    prompt: "refit the kinetic rates β and γ"
    expected: invoke
    rationale: >
      β and γ are the outputs of FIT 2; asking to refit them unambiguously
      requests stage-2 execution.

  - id: p10_context_stale_posteriors
    category: P-context
    prompt: "I changed FIT_1_N_ITER in metaparams, the posteriors are stale — please redo inference"
    expected: invoke
    rationale: >
      User already performed the config edit and explicitly asks to redo
      inference. Clear stage-2 trigger; the skill should execute.

  - id: p11_context_rerun_after_model_added
    category: P-context
    prompt: "I just added a new fit2 model variant to models.py, now run fit2 with it"
    expected: invoke
    rationale: >
      User has finished the code edit and now explicitly requests execution
      of the inference stage to test the new model.

  # ── Negative: should NOT invoke ──────────────────────────────────────────

  - id: n01_explicit_edit_models
    category: N-explicit
    prompt: "add a new Pyro model variant to models.py"
    expected: skip
    rationale: >
      Explicitly excluded: "Do NOT trigger when the user is editing model
      definitions in models.py". User wants a code edit, not stage execution.

  - id: n02_explicit_conceptual_svi
    category: N-conceptual
    prompt: "how does SVI work in Pyro?"
    expected: skip
    rationale: >
      Explicitly excluded: "asking conceptual questions about Pyro/SVI/MCMC".
      Expects an explanation, not stage execution.

  - id: n03_explicit_conceptual_elbo
    category: N-conceptual
    prompt: "what is the ELBO and why does it diverge?"
    expected: skip
    rationale: >
      Conceptual question about MCMC/SVI theory — no stage execution needed.

  - id: n04_explicit_diagnostics
    category: N-explicit
    prompt: "show me the ELBO convergence plot for the latest run"
    expected: skip
    rationale: >
      Explicitly excluded: "working on plots/diagnostics". Should route to
      veloline-analysis-result (stage 3).

  - id: n05_other_skill_setup
    category: N-other-skill
    prompt: "rebuild mp"
    expected: skip
    rationale: >
      "rebuild mp" is an exact trigger phrase for veloline-pipeline-setup
      (stage 1), not for this skill.

  - id: n06_other_skill_run_setup
    category: N-other-skill
    prompt: "run veloline pipeline setup"
    expected: skip
    rationale: >
      Exact trigger phrase for veloline-pipeline-setup, not this skill.

  - id: n07_other_skill_analysis
    category: N-other-skill
    prompt: "regenerate velocity plots from the latest run"
    expected: skip
    rationale: >
      Should trigger veloline-analysis-result (stage 3), not stage 2.

  - id: n08_edit_fit2_bug
    category: N-edit
    prompt: "fix the IndexError bug in fit2.py line 47"
    expected: skip
    rationale: >
      Code-editing request — user wants to modify fit2.py, not run the
      inference pipeline.
